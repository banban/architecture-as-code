name: Deploy Reports from ZIP

on:
  workflow_dispatch:
  push:
    paths:
      - 'artifacts/reports.zip'
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Unzip reports
        run: |
          mkdir -p extracted
          unzip artifacts/reports.zip -d extracted

      - name: Deploy to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo=https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}

          git clone --depth=1 --branch gh-pages "$repo" gh-pages 2>/dev/null || \
          git clone --depth=1 "$repo" gh-pages

          cd gh-pages
          if git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
          fi

          git rm -rf ./*
          cp -r ../extracted/* .
          touch .nojekyll

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Deploy reports from ZIP"
            git push origin gh-pages
          else
            echo "No changes to commit"
          fi